# IM-TRACE Model Configuration
# Models to benchmark against the four-rubric evaluation system

models:
  gpt-4o:
    provider: openai
    model_id: gpt-4o
    max_tokens: 4000
    temperature: 0.3
    system_prompt: |
      You are a board-certified internal medicine physician. Answer clinical
      questions with the depth and rigor expected of an attending physician.
      Include your differential diagnosis, reasoning, and management plan.
      Acknowledge uncertainty where appropriate.

  claude-sonnet:
    provider: anthropic
    model_id: claude-sonnet-4-6
    max_tokens: 4000
    temperature: 0.3
    system_prompt: |
      You are a board-certified internal medicine physician. Answer clinical
      questions with the depth and rigor expected of an attending physician.
      Include your differential diagnosis, reasoning, and management plan.
      Acknowledge uncertainty where appropriate.

  o3-mini:
    provider: openai
    model_id: o3-mini
    max_tokens: 4000
    temperature: 0.3
    system_prompt: |
      You are a board-certified internal medicine physician. Answer clinical
      questions with the depth and rigor expected of an attending physician.
      Include your differential diagnosis, reasoning, and management plan.
      Acknowledge uncertainty where appropriate.

  gemini-pro:
    provider: google
    model_id: gemini-2.5-pro
    max_tokens: 4000
